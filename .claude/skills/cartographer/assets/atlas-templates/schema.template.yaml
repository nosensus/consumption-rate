# {{project_name}} - Codebase Schema
# Machine-readable structure for AI agent navigation
# Generated by Cartographer
# Last Updated: {{timestamp}}

metadata:
  project: {{project_name}}
  atlas_version: '3.0'
  generated: {{timestamp}}
  type: {{project_type}}
  organization_style: {{organization_style}}
  stack:
    language: {{stack.language}}
    version: '{{stack.version}}'
    framework: {{stack.framework}}
    framework_version: '{{stack.framework_version}}'
{{#if stack.state_management}}
    state_management: {{stack.state_management}}
{{/if}}
{{#if stack.styling}}
    styling: {{stack.styling}}
{{/if}}
{{#if stack.routing}}
    routing: {{stack.routing}}
{{/if}}
{{#if stack.bundler}}
    bundler: {{stack.bundler}}
{{/if}}
{{#if stack.database}}
    database: {{stack.database}}
{{/if}}
{{#if stack.orm}}
    orm: {{stack.orm}}
{{/if}}
{{#if stack.api_style}}
    api_style: {{stack.api_style}}
{{/if}}
{{#if stack.auth_approach}}
    auth_approach: {{stack.auth_approach}}
{{/if}}
{{#if stack.cli_framework}}
    cli_framework: {{stack.cli_framework}}
{{/if}}
{{#if stack.build_orchestration}}
    build_orchestration: {{stack.build_orchestration}}
{{/if}}
  architecture: {{architecture}}

domains:
{{#each domains}}
  {{this.name}}:
    location: {{this.location}}
    count: {{this.count}}
    purpose: {{this.purpose}}
    confidence: {{this.confidence}}
    key_files:
{{#each this.key_files}}
      - {{this}}
{{/each}}
    documentation: {{this.documentation}}

{{/each}}

{{#if layers}}
# Architectural layers (for layer-based or hybrid organization)
layers:
{{#each layers}}
  {{this.name}}:
    location: {{this.location}}
    file_pattern: '{{this.file_pattern}}'
    count: {{this.count}}
    purpose: {{this.purpose}}
    key_files:
{{#each this.key_files}}
      - {{this}}
{{/each}}
{{#if this.domains_served}}
    domains_served:
{{#each this.domains_served}}
      - {{this}}
{{/each}}
{{/if}}
    documentation: {{this.documentation}}

{{/each}}
{{/if}}

file_patterns:
{{#each file_patterns}}
  {{this.name}}:
    pattern: {{this.pattern}}
    count: {{this.count}}
    purpose: {{this.purpose}}
    example: {{this.example}}

{{/each}}

# Task-oriented entry points for common developer workflows
task_mappings:
{{#each task_mappings}}
  {{this.id}}:
    description: '{{this.description}}'
    entry_point: {{this.entry_point}}
    patterns:
{{#each this.patterns}}
      - {{this}}
{{/each}}

{{/each}}

# External service integrations detected in codebase
{{#if integrations}}
integrations:
{{#each integrations}}
  - name: {{this.name}}
    purpose: '{{this.purpose}}'
    config_location: {{this.config_location}}
    usage_locations:
{{#each this.usage_locations}}
      - {{this}}
{{/each}}

{{/each}}
{{/if}}

# Async/queue infrastructure (if detected)
{{#if async_infrastructure}}
async_infrastructure:
  type: {{async_infrastructure.type}}  # sqs|bullmq|rabbitmq|redis|none
{{#if async_infrastructure.queues}}
  queues:
{{#each async_infrastructure.queues}}
    - name: {{this.name}}
      handler: {{this.handler}}
      purpose: '{{this.purpose}}'
{{/each}}
{{/if}}
{{/if}}

# Configuration files inventory
config_files:
  entry_point: {{config_files.entry_point}}
  package_manager: {{config_files.package_manager}}
  build_command: '{{config_files.build_command}}'
  test_command: '{{config_files.test_command}}'
  lint_command: '{{config_files.lint_command}}'
  env_template: {{config_files.env_template}}
  files:
{{#each config_files.files}}
    - path: {{this.path}}
      purpose: '{{this.purpose}}'
{{/each}}

testing:
  framework: {{testing.framework}}
  location: {{testing.location}}
  pattern: '{{testing.pattern}}'
  coverage: {{testing.coverage}}

documentation:
  domains:
{{#each documentation.domains}}
    - {{this}}
{{/each}}
  patterns:
{{#each documentation.patterns}}
    - {{this}}
{{/each}}

validation:
  working_dir: {{working_directory}}
  commands:
{{#each validation_commands}}
    - name: {{this.name}}
      command: {{this.command}}
{{/each}}

# =============================================================================
# PATTERN CONVENTIONS
# Keyword-to-pattern mapping and codebase-specific conventions for SDLC commands
# =============================================================================

# Keyword lookup table: maps user-facing keywords to pattern IDs
keyword_index:
{{#each keyword_index}}
  {{this.keyword}}: {{this.pattern_id}}
{{/each}}

# Pattern-specific conventions (codebase-specific facts)
patterns:
{{#each patterns}}
  {{this.id}}:
    keywords:
{{#each this.keywords}}
      - {{this}}
{{/each}}
    file_convention: '{{this.file_convention}}'
{{#if this.test_convention}}
    test_convention: '{{this.test_convention}}'
{{/if}}
{{#if this.registration}}
    registration:
{{#each this.registration}}
      - file: '{{this.file}}'
        action: '{{this.action}}'
{{/each}}
{{/if}}
    validation_commands:
{{#each this.validation_commands}}
      - '{{this}}'
{{/each}}
    pattern_guide: references/patterns/{{this.id}}.md
{{#if this.example_files}}
    example_files:
{{#each this.example_files}}
      - '{{this}}'
{{/each}}
{{/if}}
{{#if this.related}}
    related:
{{#each this.related}}
      - {{this}}
{{/each}}
{{/if}}
{{#if this.anti_patterns_summary}}
    # Quick reference: common mistakes to avoid (full details in pattern_guide)
    anti_patterns_summary:
{{#each this.anti_patterns_summary}}
      - '{{this}}'
{{/each}}
{{/if}}

{{/each}}

# =============================================================================
# PATTERN COMPOSITIONS
# Multi-pattern task sequences for complex workflows
# =============================================================================

compositions:
{{#each compositions}}
  {{this.id}}:
    description: '{{this.description}}'
    patterns:
{{#each this.patterns}}
      - pattern: {{this.pattern}}
        order: {{this.order}}
{{#if this.condition}}
        condition: '{{this.condition}}'
{{/if}}
{{/each}}
    validation_sequence:
{{#each this.validation_sequence}}
      - '{{this}}'
{{/each}}
{{#if this.notes}}
    notes: '{{this.notes}}'
{{/if}}

{{/each}}

# Note: Compositions are manually curated. Define common multi-pattern workflows
# that your team uses (e.g., add_api_endpoint, add_database_table).

# Reference to technology observations
observations_file: references/observations.md

